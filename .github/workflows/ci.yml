name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test-package:
    name: Build, Test & Package (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Run full test suite (swift-testing)
        run: swift test

      - name: Run self-test (debug binary sanity check)
        run: swift run TBH --self-test

      - name: Package TBH.app (release)
        run: bash scripts/package-app.sh dist

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: TBH-app
          path: dist/TBH.app
          if-no-files-found: error
